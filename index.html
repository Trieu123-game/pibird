<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Flappi Sky Master</title>
    <style>
        :root { --pi-purple: #612d8a; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #70c5ce; touch-action: none; }
        #home-screen { position: absolute; inset: 0; background: #f0f2f5; z-index: 100; display: block; }
        header { background: var(--pi-purple); color: white; padding: 30px 0; text-align: center; }
        .container { width: 90%; max-width: 400px; margin: 20px auto; }
        .game-card { background: white; border-radius: 20px; padding: 15px; display: flex; align-items: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .game-icon { width: 60px; height: 60px; background: var(--pi-purple); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 30px; margin-right: 15px; color: white; }
        #game-screen { display: none; position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; margin: 0 auto; background: #70c5ce; }
        .btn-ui { position: absolute; z-index: 110; background: white; border: none; border-radius: 10px; padding: 10px; font-weight: bold; color: var(--pi-purple); }
        #backBtn { top: 20px; left: 20px; }
        #ui { position: absolute; top: 15px; width: 100%; text-align: center; color: white; pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); z-index: 105; }
        #leaderboard { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; width: 80%; border-radius: 20px; padding: 25px; text-align: center; display: none; z-index: 120; border: 3px solid var(--pi-purple); }
        .lb-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <div id="home-screen">
        <header><h1>SKY ARENA</h1><p>Global Mastery</p></header>
        <div class="container">
            <div class="game-card" id="playBtn">
                <div class="game-icon">🐦</div>
                <div><h3 style="margin:0;color:var(--pi-purple)">Flappi Sky Master</h3><p style="margin:5px 0 0;font-size:12px;color:#666">Tap to start challenge!</p></div>
            </div>
        </div>
    </div>
    <div id="game-screen">
        <button id="backBtn" class="btn-ui" onclick="location.reload()">🏠 BACK</button>
        <div id="ui"><p style="font-size:45px;font-weight:bold;margin:0" id="score">0</p><p style="color:#FFD700">BEST: <span id="highScore">0</span></p></div>
        <div id="leaderboard"><h2 style="color:var(--pi-purple)">RANKINGS</h2><div id="lb-content"></div><button onclick="resetGame()" style="background:var(--pi-purple);color:white;border:none;padding:15px;border-radius:30px;width:100%;margin-top:15px;font-weight:bold;">PLAY AGAIN</button></div>
        <canvas id="gameCanvas"></canvas>
    </div>
<script>
    const home = document.getElementById('home-screen'), game = document.getElementById('game-screen'), canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d");
    canvas.width = Math.min(window.innerWidth, 450); canvas.height = window.innerHeight;
    
    // FIX TỐC ĐỘ: Khóa 60 FPS để không bị nhanh chậm khác nhau
    const config = { gravity: 0.25, jump: -4.8, gap: 195, speed: 2.5, fps: 60 };
    let bird = { x: 50, y: 0, v: 0 }, pipes = [], score = 0, frame = 0, active = false, hScore = localStorage.getItem("fSkyHScore") || 0;
    let lastTime = 0;

    document.getElementById('highScore').innerText = hScore;
    document.getElementById('playBtn').addEventListener('click', () => { 
        home.style.display='none'; 
        game.style.display='block'; 
        resetGame(); 
        requestAnimationFrame(loop);
    });

    function resetGame() { bird.y = canvas.height/2; bird.v = 0; pipes = []; score = 0; frame = 0; document.getElementById('score').innerText = 0; leaderboard.style.display = "none"; active = true; }
    function endGame() { 
        active = false; 
        if (score > hScore) { hScore = score; localStorage.setItem("fSkyHScore", hScore); document.getElementById('highScore').innerText = hScore; }
        const pl = [{n:"Elite Master", s:Math.max(hScore, 20)}, {n:"YOU", s:score, me:true}, {n:"Pioneer Ace", s:15}].sort((a,b)=>b.s-a.s);
        document.getElementById('lb-content').innerHTML = pl.map(p => `<div class="lb-row"><span>${p.n}</span><span>${p.s}</span></div>`).join('');
        leaderboard.style.display = "block"; 
    }

    function loop(timestamp) {
        if (!active) return;
        const deltaTime = timestamp - lastTime;
        
        if (deltaTime > 1000 / config.fps) {
            lastTime = timestamp;
            bird.v += config.gravity; 
            bird.y += bird.v;

            if (frame % 90 === 0) pipes.push({ x: canvas.width, top: Math.random() * (canvas.height - config.gap - 120) + 60, passed: false });
            
            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= config.speed;
                if (bird.x + 12 > pipes[i].x && bird.x - 12 < pipes[i].x + 65) {
                    if (bird.y - 12 < pipes[i].top || bird.y + 12 > pipes[i].top + config.gap) endGame();
                }
                if (!pipes[i].passed && pipes[i].x < bird.x) {
                    score++; 
                    document.getElementById('score').innerText = score; 
                    pipes[i].passed = true;
                }
                if (pipes[i].x < -70) pipes.splice(i, 1);
            }
            if (bird.y > canvas.height || bird.y < 0) endGame();
            frame++;
        }
        
        ctx.clearRect(0,0,canvas.width,canvas.height);
        pipes.forEach(p => { 
            ctx.fillStyle = "#612d8a"; 
            ctx.fillRect(p.x, 0, 65, p.top); 
            ctx.fillRect(p.x, p.top + config.gap, 65, canvas.height); 
        });
        ctx.save(); ctx.translate(bird.x, bird.y); ctx.fillStyle = "#A52A2A"; ctx.beginPath(); ctx.ellipse(0,0,18,14,0,0,Math.PI*2); ctx.fill(); 
        ctx.fillStyle = "#FFF"; ctx.beginPath(); ctx.ellipse(0,5,12,8,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = "orange"; ctx.beginPath(); ctx.moveTo(15,-2); ctx.lineTo(25,0); ctx.lineTo(15,2); ctx.fill();
        ctx.restore();
        
        requestAnimationFrame(loop);
    }

    const jump = (e) => { if (active && e.target.tagName !== 'BUTTON') { bird.v = config.jump; } };
    window.addEventListener('mousedown', jump); window.addEventListener('touchstart', (e) => { if(active && e.target.tagName !== 'BUTTON') e.preventDefault(); jump(e); }, {passive: false});
</script>
</body>
</html>
