<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Flappi Sky Master - Global Arena</title>
    <style>
        :root { --pi-purple: #612d8a; --sky-blue: #00bfff; }
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; background: var(--sky-blue); touch-action: none; }
        #home { position: absolute; inset: 0; background: #f8f9fa; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .pi-logo-bg { font-size: 80px; color: var(--pi-purple); margin-bottom: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .btn { background: var(--pi-purple); color: white; border: none; padding: 18px 40px; border-radius: 50px; font-size: 22px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #game-ui { position: absolute; top: 20px; width: 100%; text-align: center; color: white; font-size: 50px; font-weight: bold; text-shadow: 2px 2px 8px rgba(0,0,0,0.5); pointer-events: none; z-index: 10; }
        #mute-btn { position: absolute; top: 20px; right: 20px; background: white; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 24px; z-index: 20; cursor: pointer; }
        #leaderboard { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; width: 85%; max-width: 350px; border-radius: 25px; padding: 30px; text-align: center; display: none; z-index: 120; border: 4px solid var(--pi-purple); }
        .row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; font-weight: bold; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="game-ui">0</div>
    <button id="mute-btn">🔊</button>
    
    <div id="home">
        <div class="pi-logo-bg">π</div>
        <h1 style="color: var(--pi-purple); margin: 0;">SKY MASTER</h1>
        <p style="color: #666; margin-bottom: 30px;">Global Pioneer Challenge</p>
        <button class="btn" id="start-btn">START MISSION</button>
    </div>

    <div id="leaderboard">
        <h2 style="color: var(--pi-purple); margin: 0;">GLOBAL RANK</h2>
        <div id="ranks" style="margin: 20px 0;"></div>
        <button class="btn" onclick="resetGame()" style="width: 100%;">PLAY AGAIN</button>
    </div>

    <canvas id="c"></canvas>

<script>
    const canvas = document.getElementById("c"), ctx = canvas.getContext("2d");
    const ui = document.getElementById("game-ui"), lb = document.getElementById("leaderboard"), muteBtn = document.getElementById("mute-btn");
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    let audioCtx, isMuted = false, active = false, score = 0, hScore = localStorage.getItem("pi_hsc") || 0;
    let bgmTime = 0, pipes = [], frame = 0;
    const cfg = { g: 0.25, j: -4.8, gap: 210, spd: 3 };
    let bird = { x: 70, y: canvas.height/2, v: 0, w: 38, h: 28 };

    // --- SOUND SYSTEM 8-BIT ---
    function playNote(freq, dur, vol, type="square") {
        if (!audioCtx || isMuted) return;
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = type; o.frequency.value = freq;
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + dur);
    }

    function playBGM() {
        if (!active || isMuted) return;
        const notes = [261.63, 329.63, 392.00, 523.25]; // Do-Mi-Sol-Do
        if (frame % 15 === 0) {
            playNote(notes[bgmTime % 4], 0.2, 0.02, "triangle");
            bgmTime++;
        }
    }

    muteBtn.onclick = (e) => { isMuted = !isMuted; muteBtn.innerText = isMuted ? "🔇" : "🔊"; e.stopPropagation(); };
    document.getElementById("start-btn").onclick = () => {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById("home").style.display = "none";
        resetGame();
    };

    function resetGame() {
        bird.y = canvas.height/2; bird.v = 0; pipes = []; score = 0; frame = 0;
        ui.innerText = "0"; lb.style.display = "none"; active = true;
    }

    function die() {
        active = false; playNote(120, 0.5, 0.1, "sawtooth");
        if (score > hScore) { hScore = score; localStorage.setItem("pi_hsc", hScore); }
        document.getElementById("ranks").innerHTML = `
            <div class="row" style="color:var(--pi-purple)"><span>WORLD BEST</span><span>${Math.max(hScore, 50)}</span></div>
            <div class="row" style="background:#f0e6ff"><span>YOU</span><span>${score}</span></div>
            <div class="row"><span>PIONEER ACE</span><span>30</span></div>`;
        lb.style.display = "block";
    }

    // --- DRAWING FUNCTIONS (SVG STYLE) ---
    function drawBird(x, y, ang) {
        ctx.save(); ctx.translate(x, y); ctx.rotate(ang);
        // Thân sẻ vàng
        ctx.fillStyle = "#FFD700"; ctx.beginPath(); ctx.ellipse(0, 0, 19, 14, 0, 0, Math.PI*2); ctx.fill();
        // Cánh trắng
        ctx.fillStyle = "#FFF"; ctx.beginPath(); ctx.ellipse(-5, 2, 10, 6, 0.2, 0, Math.PI*2); ctx.fill();
        // Mắt & Mỏ
        ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(10, -5, 2.5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#FF8C00"; ctx.beginPath(); ctx.moveTo(16, -2); ctx.lineTo(25, 0); ctx.lineTo(16, 2); ctx.fill();
        ctx.restore();
    }

    function drawPipe(x, t) {
        ctx.fillStyle = "#612d8a"; ctx.shadowBlur = 10; ctx.shadowColor = "rgba(0,0,0,0.3)";
        // Trụ trên & dưới
        ctx.fillRect(x, 0, 70, t); ctx.fillRect(x, t + cfg.gap, 70, canvas.height);
        // Logo Pi trên trụ
        ctx.fillStyle = "rgba(255,255,255,0.3)"; ctx.font = "bold 30px Arial";
        ctx.fillText("π", x + 22, t - 30); ctx.fillText("π", x + 22, t + cfg.gap + 60);
        ctx.shadowBlur = 0;
    }

    function loop() {
        ctx.fillStyle = "#00bfff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        // Vẽ mây giả lập
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        for(let i=0; i<3; i++) ctx.beginPath(), ctx.arc(100 + i*300 - (frame%1000), 100, 30, 0, 7), ctx.fill();

        if (active) {
            playBGM();
            bird.v += cfg.g; bird.y += bird.v;
            if (frame % 90 === 0) pipes.push({ x: canvas.width, t: Math.random() * (canvas.height - 400) + 100 });

            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= cfg.spd;
                // HITBOX TINH CHỈNH (Tránh chết oan)
                const bx = bird.x, by = bird.y, pw = 70;
                if (bx + 14 > pipes[i].x && bx - 14 < pipes[i].x + pw) {
                    if (by - 10 < pipes[i].t || by + 10 > pipes[i].t + cfg.gap) die();
                }
                if (pipes[i].x < bird.x && !pipes[i].ok) { 
                    score++; ui.innerText = score; pipes[i].ok = true; playNote(880, 0.1, 0.05); 
                }
                if (pipes[i].x < -100) pipes.splice(i, 1);
                drawPipe(pipes[i].x, pipes[i].t);
            }
            if (bird.y > canvas.height || bird.y < 0) die();
            frame++;
        } else {
            pipes.forEach(p => drawPipe(p.x, p.t));
        }

        drawBird(bird.x, bird.y, Math.min(Math.PI/4, Math.max(-Math.PI/4, bird.v * 0.1)));
        requestAnimationFrame(loop);
    }

    const jump = () => { if(active) { bird.v = cfg.j; playNote(450, 0.08, 0.03, "square"); } };
    window.addEventListener("touchstart", (e) => { if(e.target.id !== 'mute-btn') { e.preventDefault(); jump(); } }, {passive: false});
    window.addEventListener("mousedown", (e) => { if(e.target.id !== 'mute-btn') jump(); });

    loop();
</script>
</body>
</html>
